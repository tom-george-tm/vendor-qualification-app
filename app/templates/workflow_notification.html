{% extends "base.html" %}
{% block content %}
<div class="container" style="padding: 20px; font-family: sans-serif;">
    <h1 style="color: #333;">Workflow Decision: {{ decision }}</h1>
    <p>A decision has been reached for the uploaded file: <strong>{{ filename }}</strong></p>
    <div style="background-color: #f9f9f9; padding: 15px; border-radius: 5px; margin: 20px 0;">
        <h3 style="margin-top: 0;">Reasoning:</h3>
        <p>{{ reasoning }}</p>
    </div>
    <p>Please log in to the system to view more details.</p>
</div>
{% endblock %}
