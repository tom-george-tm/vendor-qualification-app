services:
  api:
    build: .
    container_name: vendor-qualification-api
    ports:
      - "8500:8500"
    volumes:
      - ./app:/app/app
      - ./main.py:/app/main.py
    env_file:
      - .env
    restart: always
    command: [ "/uv/bin/uv", "run", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8500", "--reload" ]
